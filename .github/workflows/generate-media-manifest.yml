name: Auto-Generate Media Manifest

on:
  push:
    paths:
      - 'media/**'
      - '.github/workflows/generate-media-manifest.yml'
  workflow_dispatch:

jobs:
  generate-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate media.json manifest
        run: |
          python3 << 'PYTHON_EOF'
          import json
          import os
          from pathlib import Path

          media_dir = 'media'
          video_extensions = {'.mp4', '.mov', '.avi', '.mkv', '.webm', '.MOV', '.MP4'}
          image_extensions = {'.jpg', '.jpeg', '.png', '.gif', '.webp', '.JPG', '.PNG', '.JPEG'}

          # Get all files in media folder
          files = sorted([
            f for f in os.listdir(media_dir)
            if not f.startswith('.') and f != 'media.json'
          ])

          # Determine file types and build manifest
          media = []
          for file in files:
            ext = Path(file).suffix
            if ext in video_extensions:
              file_type = 'video'
            elif ext in image_extensions:
              file_type = 'image'
            else:
              continue  # Skip unknown file types

            media.append({'name': file, 'type': file_type})

          # Write media.json
          manifest = {'media': media}
          with open(os.path.join(media_dir, 'media.json'), 'w') as f:
            json.dump(manifest, f, indent=2)
            f.write('\n')

          print(f'Generated media.json with {len(media)} items')
          for m in media:
            print(f"  - {m['name']} ({m['type']})")
          PYTHON_EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet media/media.json; then
            echo "media.json unchanged"
          else
            git add media/media.json
            git commit -m "Auto-generate media manifest from media folder"
            git push origin HEAD:main
          fi
