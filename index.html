<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Hotel Chul - Guest Feedback</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a1a;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Slideshow Container - Full Screen */
    .slideshow-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
    }

    .slideshow-container.hidden {
      display: none;
    }

    .slides-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      z-index: 0;
      pointer-events: none;
      transition: opacity 0.8s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .slide.active {
      opacity: 1;
      z-index: 1;
      pointer-events: auto;
    }

    .slide img {
      max-width: 95%;
      max-height: 95%;
      object-fit: contain;
    }

    .slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Tap to Feedback Overlay */
    .tap-overlay {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(212, 175, 55, 0.9);
      color: #1a1a1a;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      animation: pulse 2s infinite;
      z-index: 10;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    .slide-counter {
      position: absolute;
      top: 20px;
      right: 30px;
      color: rgba(212, 175, 55, 0.7);
      font-size: 16px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 20px;
      border-radius: 20px;
      z-index: 10;
    }

    /* Responsive adjustments */
    @media (orientation: portrait) {
      .tap-overlay {
        font-size: 16px;
        padding: 12px 30px;
        bottom: 30px;
      }

      .slide-counter {
        font-size: 14px;
        padding: 8px 15px;
      }
    }

    @media (orientation: landscape) {
      .tap-overlay {
        font-size: 14px;
        padding: 10px 25px;
        bottom: 20px;
      }

      .slide-counter {
        font-size: 12px;
        padding: 6px 12px;
        top: 15px;
        right: 20px;
      }
    }

    /* Form Modal */
    .form-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 10px;
    }

    .form-modal.visible {
      display: flex;
    }

    /* Landscape: smaller padding to account for keyboard */
    @media (orientation: landscape) {
      .form-modal {
        padding: 5px;
      }
    }

    /* Prevent zoom on input focus for better UX */
    input, textarea, select {
      font-size: 16px;
    }

    .form-box {
      position: relative;
      width: 100%;
      max-width: 98%;
      height: 90vh;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
    }

    /* Portrait mode (taller, narrower) */
    @media (orientation: portrait) {
      .form-box {
        height: 85vh;
        max-width: 95%;
      }

      .form-header h1 {
        font-size: 24px;
      }

      iframe {
        min-height: 400px;
      }
    }

    /* Landscape mode (shorter, wider) */
    @media (orientation: landscape) {
      .form-box {
        height: 95vh;
        max-width: 90%;
      }

      .form-header h1 {
        font-size: 20px;
      }

      .form-header p {
        font-size: 12px;
      }

      iframe {
        min-height: 300px;
      }

      .close-btn {
        width: 45px;
        height: 45px;
        font-size: 28px;
      }
    }

    .form-header {
      background: linear-gradient(90deg, #6b1f2a 0%, #8b3a3a 100%);
      color: #d4af37;
      padding: 25px;
      text-align: center;
      flex-shrink: 0;
    }

    .form-header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .form-header p {
      font-size: 14px;
      color: #c9a961;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #d4af37;
      color: #1a1a1a;
      border: none;
      font-size: 32px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 301;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .close-btn:hover {
      background: #e6c956;
      transform: rotate(90deg);
    }

    .close-btn:active {
      transform: rotate(90deg) scale(0.95);
    }

    iframe {
      width: 100%;
      flex: 1;
      min-height: 500px;
      border: none;
      display: block;
      -webkit-overflow-scrolling: touch;
    }

    /* Thank You Screen */
    .thank-you {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #6b1f2a 0%, #3d1f2a 100%);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 250;
      flex-direction: column;
    }

    .thank-you.visible {
      display: flex;
    }

    .thank-you-content {
      text-align: center;
      color: #d4af37;
    }

    .thank-you h2 {
      font-size: 56px;
      margin-bottom: 20px;
    }

    .thank-you p {
      font-size: 24px;
      color: #c9a961;
      max-width: 600px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- Background Music -->
  <audio id="backgroundMusic"></audio>

  <!-- Full Screen Slideshow -->
  <div class="slideshow-container" id="slideshowContainer" onclick="openForm()">
    <div class="slides-wrapper" id="slidesContainer">
      <!-- Slides will be loaded here -->
    </div>
    <div class="tap-overlay">👆 TAP TO SHARE FEEDBACK</div>
    <div class="slide-counter">
      <span id="slideNumber">1</span> / <span id="totalSlides">1</span>
    </div>
  </div>

  <!-- Feedback Form Modal -->
  <div class="form-modal" id="formModal">
    <button class="close-btn" onclick="closeForm()">&#10005;</button>
    <div class="form-box">
      <div class="form-header">
        <h1>Guest Feedback</h1>
        <p>Help us serve you better</p>
      </div>
      <iframe
        id="gform"
        src="https://docs.google.com/forms/d/e/1FAIpQLSf6OdEbQtc6J0AEjtxAaPmDCz8AZHpuJzGf6ym-trYC8HWDEg/viewform?embedded=true"
        scrolling="yes"
        allow="geolocation">
      </iframe>
    </div>
  </div>

  <!-- Thank You Screen -->
  <div class="thank-you" id="thankYouScreen">
    <div class="thank-you-content">
      <h2>🙏 Thank You!</h2>
      <p>Your feedback means everything to us.<br>We look forward to serving you again.</p>
    </div>
  </div>

  <script>
    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSf6OdEbQtc6J0AEjtxAaPmDCz8AZHpuJzGf6ym-trYC8HWDEg/viewform?embedded=true";
    const mediaFolder = "media/";
    let currentSlide = 0;
    let isFormOpen = false;
    let initialFormLoad = true;
    let slides = [];
    let formOpenTime = 0;
    let formTimeout = null;
    let userHasInteracted = false;
    let formLoaded = false;

    // Background music settings
    const backgroundMusicVolume = 0.25; // 25% volume
    const duckingVolume = 0.10; // 10% when video plays
    let backgroundMusic = null;
    let audioPlaylist = []; // List of all available songs
    let currentSongIndex = 0; // Current song in shuffled playlist
    let shuffledPlaylist = []; // Today's shuffled song order

    // Validate that a media file exists and is loadable via HEAD request
    async function validateMediaFile(url) {
      try {
        const response = await fetch(url, { method: 'HEAD' });
        if (!response.ok) {
          console.warn('[Carousel] File not found or inaccessible:', url, 'status:', response.status);
          return false;
        }
        return true;
      } catch (err) {
        console.warn('[Carousel] File validation failed for:', url, err.message);
        return false;
      }
    }

    // Load a single image and return a promise that resolves when loaded or rejects on error
    function loadImageElement(src) {
      return new Promise((resolve, reject) => {
        const img = document.createElement('img');
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Image failed to load: ' + src));
        img.src = src;
      });
    }

    // Load a single video and return a promise that resolves when metadata is ready or rejects on error
    function loadVideoElement(src) {
      return new Promise((resolve, reject) => {
        const video = document.createElement('video');
        video.autoplay = false; // Do not autoplay until slide is active
        video.controls = false;
        video.muted = true;
        video.playsinline = true;
        video.loop = false;
        video.style.width = '100%';
        video.style.height = '100%';
        video.style.objectFit = 'cover';
        video.preload = 'auto';

        video.addEventListener('click', (e) => {
          e.stopPropagation();
        });

        const loadTimeout = setTimeout(() => {
          reject(new Error('Video load timeout: ' + src));
        }, 15000); // 15 second timeout for loading metadata

        video.addEventListener('loadedmetadata', () => {
          clearTimeout(loadTimeout);
          console.log('[Carousel] Video metadata loaded:', src, 'duration:', video.duration.toFixed(1) + 's');
          resolve(video);
        }, { once: true });

        video.addEventListener('error', (e) => {
          clearTimeout(loadTimeout);
          reject(new Error('Video failed to load: ' + src));
        }, { once: true });

        video.src = src;
      });
    }

    // Load media from manifest with robust error handling per item
    async function loadImages() {
      console.log('[Carousel] Starting media load...');
      try {
        const response = await fetch('media/media.json');
        if (!response.ok) {
          console.error('[Carousel] Failed to fetch media manifest, status:', response.status);
          return;
        }
        const data = await response.json();
        const mediaList = data.media || [];
        console.log('[Carousel] Manifest loaded with', mediaList.length, 'items');

        if (mediaList.length === 0) {
          console.warn('[Carousel] Media list is empty, nothing to display');
          return;
        }

        const container = document.getElementById('slidesContainer');
        let loadedCount = 0;
        let skippedCount = 0;

        for (const item of mediaList) {
          const mediaUrl = mediaFolder + item.name;
          try {
            // Step 1: Validate file exists
            const exists = await validateMediaFile(mediaUrl);
            if (!exists) {
              console.warn('[Carousel] Skipping missing file:', item.name);
              skippedCount++;
              continue;
            }

            // Step 2: Create slide and load the media element
            const slide = document.createElement('div');
            slide.className = 'slide';

            if (item.type === 'video') {
              const video = await loadVideoElement(mediaUrl);
              slide.appendChild(video);
              console.log('[Carousel] Video slide ready:', item.name);
            } else {
              const img = await loadImageElement(mediaUrl);
              slide.appendChild(img);
              console.log('[Carousel] Image slide ready:', item.name);
            }

            container.appendChild(slide);
            loadedCount++;
          } catch (itemError) {
            console.error('[Carousel] Failed to load media item, skipping:', item.name, itemError.message);
            skippedCount++;
            continue; // Skip this item, keep loading the rest
          }
        }

        console.log('[Carousel] Load complete. Loaded:', loadedCount, 'Skipped:', skippedCount);

        slides = document.querySelectorAll('.slide');
        if (slides.length > 0) {
          slides[0].classList.add('active');
          currentSlide = 0;
          document.getElementById('totalSlides').textContent = slides.length;
          console.log('[Carousel] First slide activated, total slides:', slides.length);
        } else {
          console.warn('[Carousel] No slides loaded successfully - carousel will be empty');
        }
      } catch (error) {
        console.error('[Carousel] Critical error loading media:', error);
      }
    }

    // Schedule next slide rotation (images every 5s, videos after they end)
    let rotationTimeout = null;
    let videoPlayTimeout = null;

    function scheduleNextRotation() {
      if (rotationTimeout) {
        clearTimeout(rotationTimeout);
        rotationTimeout = null;
      }
      if (videoPlayTimeout) {
        clearTimeout(videoPlayTimeout);
        videoPlayTimeout = null;
      }

      if (isFormOpen || slides.length === 0) {
        console.log('[Carousel] Rotation paused (formOpen:', isFormOpen, ', slides:', slides.length, ')');
        return;
      }

      const currentElement = slides[currentSlide];
      if (!currentElement) {
        console.error('[Carousel] Current slide element missing at index', currentSlide, '- resetting to 0');
        currentSlide = 0;
        if (slides[0]) slides[0].classList.add('active');
        rotationTimeout = setTimeout(() => scheduleNextRotation(), 2000);
        return;
      }

      const video = currentElement.querySelector('video');

      if (video) {
        console.log('[Carousel] Slide', currentSlide + 1, 'is a video');

        if (!userHasInteracted) {
          console.log('[Carousel] User has not interacted yet, skipping video slide');
          rotationTimeout = setTimeout(() => {
            advanceSlide();
            scheduleNextRotation();
          }, 1000);
          return;
        }

        // Reset video to start
        video.currentTime = 0;

        // Set up onended handler - will fire when video naturally finishes
        const handleVideoEnd = () => {
          console.log('[Carousel] Video ended naturally, advancing');
          video.removeEventListener('ended', handleVideoEnd);
          if (videoPlayTimeout) {
            clearTimeout(videoPlayTimeout);
            videoPlayTimeout = null;
          }
          restoreBackgroundMusic();
          advanceSlide();
          scheduleNextRotation();
        };

        video.addEventListener('ended', handleVideoEnd, { once: true });

        // Safety timeout: if video doesn't finish within expected time + buffer, skip it
        let skipTimeout = 30000; // 30 second fallback timeout
        if (video.duration && isFinite(video.duration) && video.duration > 0) {
          skipTimeout = (video.duration + 5) * 1000;
          console.log('[Carousel] Video duration:', video.duration.toFixed(1) + 's, safety timeout:', (skipTimeout / 1000).toFixed(1) + 's');
        } else {
          console.log('[Carousel] Video duration unknown, using fallback timeout:', skipTimeout / 1000 + 's');
        }

        videoPlayTimeout = setTimeout(() => {
          console.warn('[Carousel] Video playback timeout reached, forcing advance');
          video.removeEventListener('ended', handleVideoEnd);
          try { video.pause(); } catch(e) {}
          restoreBackgroundMusic();
          advanceSlide();
          scheduleNextRotation();
        }, skipTimeout);

        // Explicitly play the video
        video.muted = true; // Keep muted for autoplay permission
        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise
            .then(() => {
              console.log('[Carousel] Video playing successfully');
              duckBackgroundMusic();
              setTimeout(() => {
                video.muted = false;
                video.volume = 1.0;
              }, 100);
            })
            .catch(err => {
              console.error('[Carousel] Video play failed, skipping:', err.message);
              if (videoPlayTimeout) {
                clearTimeout(videoPlayTimeout);
                videoPlayTimeout = null;
              }
              video.removeEventListener('ended', handleVideoEnd);
              restoreBackgroundMusic();
              advanceSlide();
              scheduleNextRotation();
            });
        } else {
          // playPromise is undefined (very old browser), set fallback
          console.warn('[Carousel] video.play() returned undefined, relying on safety timeout');
        }
      } else {
        // Image: advance after 5 seconds
        console.log('[Carousel] Slide', currentSlide + 1, 'is an image, showing for 5s');
        rotationTimeout = setTimeout(() => {
          advanceSlide();
          scheduleNextRotation();
        }, 5000);
      }
    }

    function advanceSlide() {
      if (slides.length === 0) {
        console.warn('[Carousel] advanceSlide called but no slides exist');
        return;
      }

      // Stop and reset only the current slide's video (not all videos)
      try {
        const currentVideo = slides[currentSlide].querySelector('video');
        if (currentVideo) {
          currentVideo.pause();
          currentVideo.currentTime = 0;
          currentVideo.muted = true; // Reset mute state for next play
        }
      } catch (e) {
        console.warn('[Carousel] Error stopping video on slide', currentSlide, e.message);
      }

      slides[currentSlide].classList.remove('active');
      const previousSlide = currentSlide;
      currentSlide = (currentSlide + 1) % slides.length;
      slides[currentSlide].classList.add('active');
      document.getElementById('slideNumber').textContent = currentSlide + 1;
      console.log('[Carousel] Advanced from slide', previousSlide + 1, 'to', currentSlide + 1);
    }

    function autoRotateSlides() {
      scheduleNextRotation();
    }

    // Enter fullscreen
    function enterFullscreen() {
      const elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen().catch(() => {});
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.mozRequestFullScreen) {
        elem.mozRequestFullScreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    }

    // Open form modal
    function openForm() {
      if (isFormOpen) return;
      isFormOpen = true;
      formOpenTime = Date.now();
      document.getElementById('formModal').classList.add('visible');
      document.getElementById('slideshowContainer').style.pointerEvents = 'none';

      // Auto-close form after 3 minutes of inactivity (in case submission doesn't trigger reload)
      formTimeout = setTimeout(() => {
        console.log('Form timeout - auto-closing after 3 minutes');
        showThankYouAndReturn();
      }, 180000); // 3 minutes
    }

    // Close form modal
    function closeForm() {
      if (formTimeout) {
        clearTimeout(formTimeout);
        formTimeout = null;
      }
      document.getElementById('formModal').classList.remove('visible');
      document.getElementById('slideshowContainer').style.pointerEvents = 'auto';
      isFormOpen = false;
      scheduleNextRotation();
    }

    // Show thank you screen and return to slideshow
    function showThankYouAndReturn() {
      if (formTimeout) {
        clearTimeout(formTimeout);
        formTimeout = null;
      }
      document.getElementById('formModal').classList.remove('visible');
      document.getElementById('thankYouScreen').classList.add('visible');

      setTimeout(() => {
        document.getElementById('thankYouScreen').classList.remove('visible');
        document.getElementById('slideshowContainer').style.pointerEvents = 'auto';
        isFormOpen = false;
        // Reload form for next person
        document.getElementById('gform').src = formURL;
        formLoaded = false;
        scheduleNextRotation();
      }, 2500);
    }

    // Load audio playlist from manifest
    async function loadAudioPlaylist() {
      try {
        const response = await fetch('audio/audio.json');
        if (!response.ok) {
          throw new Error('Failed to fetch audio manifest, status: ' + response.status);
        }
        const data = await response.json();
        audioPlaylist = (data.audio || []).map(a => 'audio/' + a.name);
        console.log('Loaded audio playlist:', audioPlaylist);
        shufflePlaylistForToday();
      } catch (error) {
        console.log('No audio playlist found, using default:', error);
        audioPlaylist = ['audio/song1.mp3'];
        shuffledPlaylist = audioPlaylist;
      }
    }

    // Seeded shuffle based on today's date (same shuffle for entire day)
    function shufflePlaylistForToday() {
      // Use today's date as seed
      const today = new Date();
      const dayString = today.getFullYear() + '-' + (today.getMonth() + 1) + '-' + today.getDate();

      // Create shuffled copy
      shuffledPlaylist = [...audioPlaylist];

      // Seeded shuffle using day string as seed
      let seed = 0;
      for (let i = 0; i < dayString.length; i++) {
        seed = ((seed << 5) - seed) + dayString.charCodeAt(i);
        seed = seed & seed; // Convert to 32-bit integer
      }

      // Shuffle with seeded random
      for (let i = shuffledPlaylist.length - 1; i > 0; i--) {
        seed = (seed * 9301 + 49297) % 233280;
        const j = Math.floor((seed / 233280) * (i + 1));
        [shuffledPlaylist[i], shuffledPlaylist[j]] = [shuffledPlaylist[j], shuffledPlaylist[i]];
      }

      console.log('Shuffled playlist for today:', shuffledPlaylist);
      currentSongIndex = 0;
    }

    // Background music control functions
    function duckBackgroundMusic() {
      if (backgroundMusic) {
        console.log('Ducking background music volume to', duckingVolume);
        backgroundMusic.volume = duckingVolume;
      }
    }

    function restoreBackgroundMusic() {
      if (backgroundMusic) {
        console.log('Restoring background music volume to', backgroundMusicVolume);
        backgroundMusic.volume = backgroundMusicVolume;
      }
    }

    function playNextSong() {
      if (shuffledPlaylist.length === 0) {
        console.log('No songs in playlist');
        return;
      }

      // Get current song
      const currentSong = shuffledPlaylist[currentSongIndex];
      console.log('Playing song', currentSongIndex + 1, 'of', shuffledPlaylist.length, ':', currentSong);

      // Set audio source and play
      backgroundMusic.src = currentSong;
      backgroundMusic.volume = backgroundMusicVolume;

      const playPromise = backgroundMusic.play();
      if (playPromise !== undefined) {
        playPromise
          .then(() => {
            console.log('Now playing:', currentSong);
            songRetryCount = 0;
          })
          .catch(err => {
            console.log('Song autoplay blocked (waiting for user interaction):', err);
            // Move to next song on error
            moveToNextSong();
          });
      }
    }

    let songRetryCount = 0;
    function moveToNextSong() {
      songRetryCount++;
      if (songRetryCount > shuffledPlaylist.length) {
        console.error('All songs failed to play, stopping music');
        songRetryCount = 0;
        return;
      }
      currentSongIndex = (currentSongIndex + 1) % shuffledPlaylist.length;
      playNextSong();
    }

    function startBackgroundMusic() {
      backgroundMusic = document.getElementById('backgroundMusic');
      if (backgroundMusic) {
        // Set up onended handler to play next song
        backgroundMusic.addEventListener('ended', () => {
          console.log('Song ended, moving to next');
          moveToNextSong();
        });

        // Load playlist and start playing
        loadAudioPlaylist().then(() => {
          playNextSong();
        });
      }
    }

    // Detect form submission via iframe reload
    document.getElementById('gform').addEventListener('load', function () {
      if (!formLoaded) {
        formLoaded = true;
        return;
      }

      // Form was submitted (page reloaded after success)
      console.log('Form submission detected via iframe reload');
      showThankYouAndReturn();
    });

    // Request fullscreen on first tap/click and enable video autoplay
    let fullscreenRequested = false;
    function enableVideoPlayback() {
      if (!fullscreenRequested) {
        fullscreenRequested = true;
        userHasInteracted = true;
        console.log('User interacted, videos can now play');
        enterFullscreen();

        // Start background music on first interaction
        startBackgroundMusic();

        // Trigger rotation to start playing video if current slide is a video
        scheduleNextRotation();
      }
    }

    document.addEventListener('touchstart', enableVideoPlayback);
    document.addEventListener('click', enableVideoPlayback);

    // Initialize on load
    window.addEventListener('load', async () => {
      await loadImages();
      if (slides.length === 0) {
        const container = document.getElementById('slidesContainer');
        container.innerHTML = '<div style="color: #d4af37; text-align: center; font-size: 24px; padding: 40px;">Unable to load media. Please check the media folder.</div>';
      }
      autoRotateSlides();
    });
  </script>

</body>
</html>
