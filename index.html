<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Chul - Guest Feedback</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a1a;
      overflow: hidden;
    }

    /* Slideshow Container - Full Screen */
    .slideshow-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
    }

    .slideshow-container.hidden {
      display: none;
    }

    .slides-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .slide.active {
      opacity: 1;
    }

    .slide img,
    .slide video {
      max-width: 95%;
      max-height: 95%;
      object-fit: contain;
    }

    .slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Tap to Feedback Overlay */
    .tap-overlay {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(212, 175, 55, 0.9);
      color: #1a1a1a;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      animation: pulse 2s infinite;
      z-index: 10;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    .slide-counter {
      position: absolute;
      top: 20px;
      right: 30px;
      color: rgba(212, 175, 55, 0.7);
      font-size: 16px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 20px;
      border-radius: 20px;
      z-index: 10;
    }

    /* Responsive adjustments */
    @media (orientation: portrait) {
      .tap-overlay {
        font-size: 16px;
        padding: 12px 30px;
        bottom: 30px;
      }

      .slide-counter {
        font-size: 14px;
        padding: 8px 15px;
      }
    }

    @media (orientation: landscape) {
      .tap-overlay {
        font-size: 14px;
        padding: 10px 25px;
        bottom: 20px;
      }

      .slide-counter {
        font-size: 12px;
        padding: 6px 12px;
        top: 15px;
        right: 20px;
      }
    }

    /* Form Modal */
    .form-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 10px;
    }

    .form-modal.visible {
      display: flex;
    }

    /* Landscape: smaller padding to account for keyboard */
    @media (orientation: landscape) {
      .form-modal {
        padding: 5px;
      }
    }

    /* Prevent zoom on input focus for better UX */
    input, textarea, select {
      font-size: 16px;
    }

    .form-box {
      position: relative;
      width: 100%;
      max-width: 98%;
      height: 90vh;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
    }

    /* Portrait mode (taller, narrower) */
    @media (orientation: portrait) {
      .form-box {
        height: 85vh;
        max-width: 95%;
      }

      .form-header h1 {
        font-size: 24px;
      }

      iframe {
        min-height: 400px;
      }
    }

    /* Landscape mode (shorter, wider) */
    @media (orientation: landscape) {
      .form-box {
        height: 95vh;
        max-width: 90%;
      }

      .form-header h1 {
        font-size: 20px;
      }

      .form-header p {
        font-size: 12px;
      }

      iframe {
        min-height: 300px;
      }

      .close-btn {
        width: 45px;
        height: 45px;
        font-size: 28px;
      }
    }

    .form-header {
      background: linear-gradient(90deg, #6b1f2a 0%, #8b3a3a 100%);
      color: #d4af37;
      padding: 25px;
      text-align: center;
      flex-shrink: 0;
    }

    .form-header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .form-header p {
      font-size: 14px;
      color: #c9a961;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #d4af37;
      color: #1a1a1a;
      border: none;
      font-size: 32px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 301;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .close-btn:hover {
      background: #e6c956;
      transform: rotate(90deg);
    }

    .close-btn:active {
      transform: rotate(90deg) scale(0.95);
    }

    iframe {
      width: 100%;
      flex: 1;
      min-height: 500px;
      border: none;
      display: block;
      -webkit-overflow-scrolling: touch;
    }

    /* Thank You Screen */
    .thank-you {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #6b1f2a 0%, #3d1f2a 100%);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 250;
      flex-direction: column;
    }

    .thank-you.visible {
      display: flex;
    }

    .thank-you-content {
      text-align: center;
      color: #d4af37;
    }

    .thank-you h2 {
      font-size: 56px;
      margin-bottom: 20px;
    }

    .thank-you p {
      font-size: 24px;
      color: #c9a961;
      max-width: 600px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- Full Screen Slideshow -->
  <div class="slideshow-container" id="slideshowContainer" onclick="openForm()">
    <div class="slides-wrapper" id="slidesContainer">
      <!-- Slides will be loaded here -->
    </div>
    <div class="tap-overlay">👆 TAP TO SHARE FEEDBACK</div>
    <div class="slide-counter">
      <span id="slideNumber">1</span> / <span id="totalSlides">1</span>
    </div>
  </div>

  <!-- Feedback Form Modal -->
  <div class="form-modal" id="formModal">
    <button class="close-btn" onclick="closeForm()">&#10005;</button>
    <div class="form-box">
      <div class="form-header">
        <h1>Guest Feedback</h1>
        <p>Help us serve you better</p>
      </div>
      <iframe
        id="gform"
        src="https://docs.google.com/forms/d/e/1FAIpQLSf6OdEbQtc6J0AEjtxAaPmDCz8AZHpuJzGf6ym-trYC8HWDEg/viewform?embedded=true"
        scrolling="yes"
        allow="geolocation">
      </iframe>
    </div>
  </div>

  <!-- Thank You Screen -->
  <div class="thank-you" id="thankYouScreen">
    <div class="thank-you-content">
      <h2>🙏 Thank You!</h2>
      <p>Your feedback means everything to us.<br>We look forward to serving you again.</p>
    </div>
  </div>

  <script>
    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSf6OdEbQtc6J0AEjtxAaPmDCz8AZHpuJzGf6ym-trYC8HWDEg/viewform?embedded=true";
    const mediaFolder = "media/";
    let currentSlide = 0;
    let isFormOpen = false;
    let initialFormLoad = true;
    let slides = [];

    // Load media from manifest
    async function loadImages() {
      try {
        const response = await fetch('media/media.json');
        const data = await response.json();
        const mediaList = data.media || [];

        const container = document.getElementById('slidesContainer');

        mediaList.forEach((item) => {
          const slide = document.createElement('div');
          slide.className = 'slide';

          if (item.type === 'video') {
            const video = document.createElement('video');
            video.src = mediaFolder + item.name;
            video.autoplay = true; // Critical for iOS
            video.controls = false;
            video.muted = true; // iOS requires muted to autoplay
            video.playsinline = true; // iOS fullscreen fix
            video.loop = false;
            video.style.width = '100%';
            video.style.height = '100%';
            video.style.objectFit = 'cover';
            video.preload = 'auto';

            // Prevent click from bubbling to parent (which opens form)
            video.addEventListener('click', (e) => {
              e.stopPropagation();
              // If user clicks video and it's paused, try to play it
              if (video.paused) {
                console.log('User clicked video, attempting to play');
                video.play().catch(err => console.log('Play error:', err));
              } else {
                video.pause();
              }
            });

            // Unmute once it starts playing
            video.addEventListener('play', () => {
              console.log('Video started playing, unmuting');
              video.muted = false;
              video.volume = 1.0;
            });

            video.addEventListener('loadedmetadata', () => {
              console.log('Video loaded:', item.name);
            });

            video.addEventListener('error', (e) => {
              console.error('Video failed to load:', item.name, e);
            });

            slide.appendChild(video);
          } else {
            const img = document.createElement('img');
            img.src = mediaFolder + item.name;
            slide.appendChild(img);
          }

          container.appendChild(slide);
        });

        slides = document.querySelectorAll('.slide');
        if (slides.length > 0) {
          slides[0].classList.add('active');
          currentSlide = 0;
          document.getElementById('totalSlides').textContent = slides.length;
        }
      } catch (error) {
        console.error('Error loading media:', error);
      }
    }

    // Auto-rotate slides every 5 seconds
    function autoRotateSlides() {
      setInterval(() => {
        if (!isFormOpen && slides.length > 0) {
          // Don't skip if a video is currently playing
          const currentVideo = slides[currentSlide].querySelector('video');
          if (currentVideo && !currentVideo.paused && !currentVideo.ended) {
            // Video still playing, skip this rotation
            return;
          }

          // Stop all videos first
          document.querySelectorAll('video').forEach(v => {
            v.pause();
            v.currentTime = 0;
          });

          slides[currentSlide].classList.remove('active');
          currentSlide = (currentSlide + 1) % slides.length;
          slides[currentSlide].classList.add('active');
          document.getElementById('slideNumber').textContent = currentSlide + 1;

          // If it's a video, ensure it plays
          const video = slides[currentSlide].querySelector('video');
          if (video) {
            console.log('Video element found:', video.src);
            video.currentTime = 0;
            video.muted = true; // Ensure muted for iOS autoplay

            // Try to play - might be blocked on iOS but autoplay attribute should handle it
            if (video.paused) {
              const playPromise = video.play();
              if (playPromise !== undefined) {
                playPromise
                  .then(() => {
                    console.log('Video playing via JavaScript');
                  })
                  .catch(error => {
                    console.log('Video autoplay blocked (relying on autoplay attr):', error);
                  });
              }
            }

            // Move to next when video ends
            video.onended = () => {
              console.log('Video ended, moving to next');
              setTimeout(() => {
                if (slides.length > 0) {
                  slides[currentSlide].classList.remove('active');
                  currentSlide = (currentSlide + 1) % slides.length;
                  slides[currentSlide].classList.add('active');
                  document.getElementById('slideNumber').textContent = currentSlide + 1;
                }
              }, 1000);
            };
          }
        }
      }, 5000);
    }

    // Enter fullscreen
    function enterFullscreen() {
      const elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen().catch(() => {});
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.mozRequestFullScreen) {
        elem.mozRequestFullScreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    }

    // Open form modal
    function openForm() {
      if (isFormOpen) return;
      isFormOpen = true;
      document.getElementById('formModal').classList.add('visible');
      document.getElementById('slideshowContainer').style.pointerEvents = 'none';
    }

    // Close form modal
    function closeForm() {
      document.getElementById('formModal').classList.remove('visible');
      document.getElementById('slideshowContainer').style.pointerEvents = 'auto';
      isFormOpen = false;
    }

    // Pre-load iframe on page load
    let formLoaded = false;
    document.getElementById('gform').addEventListener('load', function () {
      if (!formLoaded) {
        formLoaded = true;
        return;
      }

      // Form was submitted (page reloaded after success)
      document.getElementById('formModal').classList.remove('visible');
      document.getElementById('thankYouScreen').classList.add('visible');

      // Return to slideshow after 4-5 seconds
      setTimeout(() => {
        document.getElementById('thankYouScreen').classList.remove('visible');
        document.getElementById('slideshowContainer').style.pointerEvents = 'auto';
        isFormOpen = false;
        // Reload form for next person
        document.getElementById('gform').src = formURL;
        formLoaded = false;
      }, 4500);
    });

    // Request fullscreen on first tap/click
    let fullscreenRequested = false;
    document.addEventListener('touchstart', () => {
      if (!fullscreenRequested) {
        fullscreenRequested = true;
        enterFullscreen();
      }
    });

    document.addEventListener('click', () => {
      if (!fullscreenRequested) {
        fullscreenRequested = true;
        enterFullscreen();
      }
    });

    // Handle orientation changes
    window.addEventListener('orientationchange', () => {
      setTimeout(() => {
        // Adjust form modal size on rotation
        const formModal = document.getElementById('formModal');
        if (formModal.classList.contains('visible')) {
          formModal.classList.remove('visible');
          setTimeout(() => {
            formModal.classList.add('visible');
          }, 100);
        }
      }, 100);
    });

    // Initialize on load
    window.addEventListener('load', () => {
      loadImages();
      autoRotateSlides();

      // Pre-warm the iframe by ensuring it's loaded
      setTimeout(() => {
        const iframe = document.getElementById('gform');
        if (iframe) {
          iframe.src = formURL;
        }
      }, 500);
    });
  </script>

</body>
</html>
