<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Chul - Guest Feedback</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a1a;
      overflow: hidden;
    }

    /* Slideshow Container - Full Screen */
    .slideshow-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
    }

    .slideshow-container.hidden {
      display: none;
    }

    .slides-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .slide.active {
      opacity: 1;
    }

    .slide img {
      max-width: 95%;
      max-height: 95%;
      object-fit: contain;
    }

    /* Tap to Feedback Overlay */
    .tap-overlay {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(212, 175, 55, 0.9);
      color: #1a1a1a;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      animation: pulse 2s infinite;
      z-index: 10;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    .slide-counter {
      position: absolute;
      top: 20px;
      right: 30px;
      color: rgba(212, 175, 55, 0.7);
      font-size: 16px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 20px;
      border-radius: 20px;
      z-index: 10;
    }

    /* Form Modal */
    .form-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }

    .form-modal.visible {
      display: flex;
    }

    .form-box {
      position: relative;
      width: 100%;
      max-width: 900px;
      max-height: 90vh;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
    }

    .form-header {
      background: linear-gradient(90deg, #6b1f2a 0%, #8b3a3a 100%);
      color: #d4af37;
      padding: 25px;
      text-align: center;
    }

    .form-header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .form-header p {
      font-size: 14px;
      color: #c9a961;
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #d4af37;
      color: #1a1a1a;
      border: none;
      font-size: 32px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 300;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover {
      background: #e6c956;
      transform: rotate(90deg);
    }

    iframe {
      width: 100%;
      height: calc(90vh - 90px);
      border: none;
    }

    /* Thank You Screen */
    .thank-you {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #6b1f2a 0%, #3d1f2a 100%);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 250;
      flex-direction: column;
    }

    .thank-you.visible {
      display: flex;
    }

    .thank-you-content {
      text-align: center;
      color: #d4af37;
    }

    .thank-you h2 {
      font-size: 56px;
      margin-bottom: 20px;
    }

    .thank-you p {
      font-size: 24px;
      color: #c9a961;
      max-width: 600px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- Full Screen Slideshow -->
  <div class="slideshow-container" id="slideshowContainer" onclick="openForm()">
    <div class="slides-wrapper" id="slidesContainer">
      <!-- Slides will be loaded here -->
    </div>
    <div class="tap-overlay">👆 TAP TO SHARE FEEDBACK</div>
    <div class="slide-counter">
      <span id="slideNumber">1</span> / <span id="totalSlides">1</span>
    </div>
  </div>

  <!-- Feedback Form Modal -->
  <div class="form-modal" id="formModal">
    <div class="form-box">
      <button class="close-btn" onclick="closeForm()">✕</button>
      <div class="form-header">
        <h1>Guest Feedback</h1>
        <p>Help us serve you better</p>
      </div>
      <iframe
        id="gform"
        src="https://docs.google.com/forms/d/e/1FAIpQLSfrv9zDJxLrM3p6QKfFnWy9F-v9aQE3xLrT9rS9eQ2X8fKxlQ/viewform?embedded=true">
      </iframe>
    </div>
  </div>

  <!-- Thank You Screen -->
  <div class="thank-you" id="thankYouScreen">
    <div class="thank-you-content">
      <h2>🙏 Thank You!</h2>
      <p>Your feedback means everything to us.<br>We look forward to serving you again.</p>
    </div>
  </div>

  <script>
    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSf6OdEbQtc6J0AEjtxAaPmDCz8AZHpuJzGf6ym-trYC8HWDEg/viewform?embedded=true";
    const imageFolder = "images/";
    let currentSlide = 0;
    let isFormOpen = false;
    let initialFormLoad = true;
    let slides = [];

    // Load images dynamically
    function loadImages() {
      const container = document.getElementById('slidesContainer');

      // Load dish1 through dish8
      const imageNames = [
        'dish1.png', 'dish2.png', 'dish3.png', 'dish4.png',
        'dish5.png', 'dish6.png', 'dish7.png', 'dish8.png'
      ];

      imageNames.forEach((imageName) => {
        const slide = document.createElement('div');
        slide.className = 'slide';

        const img = document.createElement('img');
        img.src = imageFolder + imageName;
        img.onerror = () => {
          // Try .jpg if .png fails
          img.src = imageFolder + imageName.replace('.png', '.jpg');
        };

        slide.appendChild(img);
        container.appendChild(slide);
      });

      slides = document.querySelectorAll('.slide');

      // Filter out broken images and show only loaded ones
      setTimeout(() => {
        const loadedSlides = Array.from(slides).filter(slide => {
          const img = slide.querySelector('img');
          return img && img.naturalHeight > 0;
        });

        if (loadedSlides.length > 0) {
          slides.forEach(s => s.classList.remove('active'));
          loadedSlides[0].classList.add('active');
          currentSlide = 0;
          document.getElementById('totalSlides').textContent = loadedSlides.length;
        }
      }, 1500);
    }

    // Auto-rotate slides every 5 seconds
    function autoRotateSlides() {
      setInterval(() => {
        if (!isFormOpen && slides.length > 0) {
          slides[currentSlide].classList.remove('active');
          currentSlide = (currentSlide + 1) % slides.length;
          slides[currentSlide].classList.add('active');
          document.getElementById('slideNumber').textContent = currentSlide + 1;
        }
      }, 5000);
    }

    // Open form modal
    function openForm() {
      if (isFormOpen) return;
      isFormOpen = true;
      document.getElementById('formModal').classList.add('visible');
      document.getElementById('slideshowContainer').style.pointerEvents = 'none';
    }

    // Close form modal
    function closeForm() {
      document.getElementById('formModal').classList.remove('visible');
      document.getElementById('slideshowContainer').style.pointerEvents = 'auto';
      isFormOpen = false;
      // Reset form
      document.getElementById('gform').src = formURL;
      initialFormLoad = true;
    }

    // Detect form submission
    document.getElementById('gform').addEventListener('load', function () {
      if (initialFormLoad) {
        initialFormLoad = false;
        return;
      }

      // Form submitted - show thank you
      document.getElementById('formModal').classList.remove('visible');
      document.getElementById('thankYouScreen').classList.add('visible');

      // Return to slideshow after 4-5 seconds
      setTimeout(() => {
        document.getElementById('thankYouScreen').classList.remove('visible');
        document.getElementById('slideshowContainer').style.pointerEvents = 'auto';
        isFormOpen = false;
        document.getElementById('gform').src = formURL;
        initialFormLoad = true;
      }, 4500);
    });

    // Initialize on load
    window.addEventListener('load', () => {
      loadImages();
      autoRotateSlides();
    });
  </script>

</body>
</html>
